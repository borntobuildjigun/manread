<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manread - 우리들의 책방</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="app">
        <!-- 상단 플로팅 타이머 -->
        <div id="floating-timer" class="hidden">
            <span class="nav-icon">📖</span>
            <span id="floating-timer-display">00:00:00</span>
            <button id="floating-timer-toggle" class="btn-icon">⏸️</button>
        </div>

        <!-- 로딩 오버레이 -->
        <div id="loading-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div class="timer-display" style="font-size: 1.5rem;">잠시만 기다려주세요...</div>
            <p id="loading-message">데이터를 불러오고 있습니다.</p>
        </div>

        <!-- 1. 로그인 화면 -->
        <div id="login-view" class="card" style="text-align: center;">
            <h1 class="serif">반가워요 👋</h1>
            <p>우리들의 책방에 로그인하여 나만의 독서 기록을 시작하세요.</p>
            <button id="google-login-btn" class="btn" style="width: 100%; background: #4285F4; margin-top: 10px;">
                <span style="margin-right: 8px;">G</span> 구글로 계속하기
            </button>
        </div>

        <!-- 2. 메인 피드 -->
        <div id="feed-view" class="hidden">
            <h1 class="serif">활동의 중심</h1>
            <p style="color:var(--text-muted); margin-bottom:20px;">마을 사람들의 최신 독서 활동입니다.</p>
            <div id="activity-feed"></div>
            <div id="feed-more-container" style="text-align: center; margin-top: 20px;">
                <button id="load-more-btn" class="btn btn-outline" style="width: 100%;">활동 더 보기</button>
            </div>
        </div>

        <!-- 3. 마을 사람들 -->
        <div id="people-view" class="hidden">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="serif" style="margin:0;">마을 사람들</h1>
                <button id="register-person-btn" class="btn btn-outline btn-small">+ 이웃 등록</button>
            </header>
            <p style="color:var(--text-muted); margin-bottom:20px;">함께 책을 읽고 있는 이웃들입니다.</p>
            <div id="people-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
        </div>

        <!-- 4. 책방 -->
        <div id="bookstore-view" class="hidden">
            <header style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <h1 class="serif" id="user-greeting">나의 책방</h1>
                        <button id="edit-profile-btn" class="btn-icon" title="프로필 수정">✏️</button>
                    </div>
                    <div id="owner-actions" class="hidden" style="display: flex; gap: 8px;">
                        <button id="trash-btn" class="btn btn-outline" style="border-color: #e74c3c; color: #e74c3c;">🗑️</button>
                        <button id="add-book-btn" class="btn btn-outline">+ 새 책</button>
                        <button id="logout-btn" class="btn btn-outline" style="border-color: #95a5a6; color: #95a5a6;">로그아웃</button>
                    </div>
                </div>
                <!-- 프로필 수정 영역 (토글형) -->
                <div id="profile-settings" class="card hidden" style="background: var(--accent-soft); border: none; padding: 15px; margin-top: 10px;">
                    <h4 style="margin-top:0;">👤 프로필 설정</h4>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="nickname-edit-input" placeholder="새로운 닉네임" maxlength="15" style="margin-bottom:0;">
                        <button id="save-nickname-btn" class="btn btn-small">저장</button>
                    </div>
                </div>
            </header>
            <div id="book-list"></div>
        </div>

        <!-- 5. 독서 기록/타이머 -->
        <div id="tracker-view" class="hidden">
            <button id="back-to-store-btn" style="background:none; border:none; cursor:pointer; color:var(--text-muted); margin-bottom:12px;">← 책방으로</button>
            <div class="card">
                <h2 id="current-book-title" class="serif">읽고 있는 책</h2>
                <div id="timer-section" class="hidden">
                    <div class="timer-display" id="timer">00:00:00</div>
                    <div style="display: flex; gap: 10px; margin-bottom: 24px;">
                        <button id="timer-btn" class="btn" style="flex: 1;">읽기 시작</button>
                        <button id="finish-btn" class="btn btn-outline" style="flex: 1;">독서 종료</button>
                    </div>
                </div>
                <div id="record-entry" class="card hidden" style="background: var(--accent-soft); border: none;">
                    <h3 id="record-entry-title" style="margin-top:0;">📝 순간의 기록</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px;">
                        <input type="number" id="page-input" placeholder="페이지">
                        <input type="number" id="paragraph-input" placeholder="문단">
                        <input type="number" id="line-input" placeholder="줄">
                    </div>
                    <textarea id="record-input" placeholder="인상 깊은 문장이나 생각을 적어보세요..." rows="4"></textarea>
                    <div style="display: flex; gap: 8px;">
                        <button id="save-record-btn" class="btn" style="flex: 2;">기록하기</button>
                        <button id="cancel-edit-btn" class="btn btn-outline hidden" style="flex: 1;">취소</button>
                    </div>
                </div>
                <div class="tracker-content-grid" style="margin-top: 24px;">
                    <div id="records-list"></div>
                    <div id="sessions-list"></div>
                </div>
            </div>
        </div>

        <!-- 6. 휴지통 뷰 -->
        <div id="trash-view" class="hidden">
            <button id="back-from-trash-btn" style="background:none; border:none; cursor:pointer; color:var(--text-muted); margin-bottom:12px;">← 책방으로</button>
            <h1 class="serif">휴지통</h1>
            <p style="color:var(--text-muted); margin-bottom:20px;">삭제된 기록들입니다. 복원하거나 영구 삭제할 수 있습니다.</p>
            <div id="trash-list"></div>
        </div>

        <!-- 하단 내비게이션 -->
        <nav id="bottom-nav" class="hidden">
            <button class="nav-item" data-view="feed">
                <span class="nav-icon">🏠</span>
                <span>활동</span>
            </button>
            <button class="nav-item" data-view="people">
                <span class="nav-icon">🏘️</span>
                <span>마을</span>
            </button>
            <button class="nav-item" data-view="bookstore">
                <span class="nav-icon">📚</span>
                <span>내 책방</span>
            </button>
        </nav>
    </div>
    <script defer src="main.js"></script>
</body>
</html>
